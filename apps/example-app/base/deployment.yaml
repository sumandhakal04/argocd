apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  namespace: exampleapp-dev
  labels:
    app: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"       # 0.05 CPU cores
              memory: "64Mi"   # 64 MiB RAM
            limits:
              cpu: "250m"      # 0.25 CPU cores
              memory: "128Mi"  # 128 MiB RAM
